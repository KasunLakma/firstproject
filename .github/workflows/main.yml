name: Next.js CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # මෙතන 20 හෝ 22 දමන්න
          cache: 'npm'       # Build එක වේගවත් කිරීමට cache භාවිතා කරන්න

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build