name: Next.js CI

on:
  push:
    branches: [ main ]
  pull request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/Setup-node@v3
        with:
            node-version: "24.x"

      - name: Install dependencies
        runs: npm ci

      - name: Build project
        run: npm run build
